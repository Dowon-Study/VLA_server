# ============================================================
# OpenVLA Full Fine-tuning Config — LIBERO
# ============================================================
#
# 참고 논문: Kim et al., "OpenVLA" (2024), arXiv:2406.09246
#
# [Full Fine-tuning 설정 근거]
#   - OpenVLA 논문은 LoRA(LR=5e-4)를 사용했으나, 본 실험은 Full FT 방식
#   - Full FT LR: 2e-5  (대형 모델 Full FT 표준; LoRA 5e-4의 1/25 수준)
#     → 너무 높으면 catastrophic forgetting 발생
#   - 현재 기본 설정: 65/GPU × 2 GPU = 130  (B200 2장 공격적 활용)
#   - 스텝: 논문 기준 50K(Spatial/Object), 80K(LIBERO-10) 따름
#   - FSDP ZeRO-3: 2 GPU에 파라미터+옵티마이저 상태 분산
# ============================================================

model:
  pretrained: "openvla/openvla-7b"
  # flash_attention_2: Ampere+ GPU (A100/H100/B200) 필수
  # 빌드 실패 시 "eager"로 변경
  attn_implementation: "flash_attention_2"
  image_size: 224
  # Full FT에서 activation memory 절약 필수
  gradient_checkpointing: true

lora:
  enabled: false   # Full fine-tuning — LoRA 비사용

training:
  # ── Learning rate ──────────────────────────────────────────
  # Full FT 기준: 2e-5 (LoRA 5e-4와 다름)
  # 더 보수적으로 가려면 1e-5 사용
  learning_rate: 2.0e-5
  # 500 스텝 선형 warmup 후 constant 유지 (논문 §B.2)
  lr_scheduler: "constant_with_warmup"
  warmup_steps: 500

  # ── Steps ──────────────────────────────────────────────────
  # 논문 기준: Spatial/Object=50K, Goal=60K, LIBERO-10=80K
  # B200×16 유효배치=256 기준 400K프레임 ≈ 1560 steps/epoch
  # 50K steps ≈ 32 epochs
  max_steps: 50000

  # ── Batch ──────────────────────────────────────────────────
  # B200 192GB VRAM을 적극 활용하는 기본값
  # 유효 배치 = 65 × 2 GPU = 130
  per_device_train_batch_size: 65
  gradient_accumulation_steps: 1

  # ── Optimizer (AdamW, 논문 §B.2) ───────────────────────────
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  max_grad_norm: 1.0

  # ── Precision ──────────────────────────────────────────────
  bf16: true      # B200 native BF16
  tf32: true      # Tensor Core 활용

  # ── Checkpoint / Log ───────────────────────────────────────
  save_steps: 5000
  save_total_limit: 5
  logging_steps: 50
  dataloader_num_workers: 4
  seed: 42

data:
  action_bins: 256
  action_dim: 7
  camera_key: "observation.images.image"
  # Save this key into model.config.norm_stats for predict_action(..., unnorm_key=...).
  # Use libero_spatial/libero_object/libero_goal/libero_10 if evaluating with the official script.
  unnorm_key: "libero_custom"
  # OpenVLA normalizes actions with robust quantile bounds and unnormalizes with q01/q99.
  # Falls back to min/max if the local LeRobot stats.json has no q01/q99.
  norm_mode: "quantile"
  # LIBERO OpenVLA checkpoints were trained with random crop + color jitter.
  image_aug: true
  random_crop_scale: 0.9
  color_jitter: 0.2
  hue_jitter: 0.05
  # Official modified LIBERO datasets remove no-op transitions.
  skip_noop_actions: true
  noop_threshold: 1.0e-4
