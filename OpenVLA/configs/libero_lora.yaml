# OpenVLA LoRA fine-tuning config — LIBERO dataset
# Hyperparameters follow Kim et al., "OpenVLA: An Open-Source Vision-Language-Action Model" (2024)
# https://arxiv.org/abs/2406.09246

model:
  pretrained: "openvla/openvla-7b"
  # flash_attention_2 requires flash-attn package (installed in setup.sh)
  # Set to "eager" if flash-attn build fails
  attn_implementation: "flash_attention_2"

lora:
  # OpenVLA paper: rank=32, alpha=16 (Table B.2)
  rank: 32
  alpha: 16
  dropout: 0.0
  # All linear layers in the LLM backbone (Llama-2)
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  # LR: 2e-5 with linear warmup 500 steps, then constant (OpenVLA paper §B.2)
  learning_rate: 2.0e-5
  lr_scheduler: "constant_with_warmup"
  warmup_steps: 500
  # 50K steps covers ~2 epochs for LIBERO 3664-episode dataset (batch=16)
  max_steps: 50000
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 1
  # AdamW: β1=0.9, β2=0.95, ε=1e-8, weight_decay=0.1 (paper §B.2)
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  max_grad_norm: 1.0
  bf16: true
  save_steps: 5000
  save_total_limit: 5
  logging_steps: 100
  dataloader_num_workers: 4
  seed: 42

data:
  action_bins: 256
  action_dim: 7
  # Primary camera key in lerobot parquet dataset
  # LIBERO has two cameras; use the main front camera
  camera_key: "observation.images.image"
  image_size: 224          # OpenVLA input resolution
  # Normalize actions to [-1, 1] using dataset stats.json
  # "minmax" → use min/max; "quantile" → use q01/q99 (more robust)
  norm_mode: "minmax"
